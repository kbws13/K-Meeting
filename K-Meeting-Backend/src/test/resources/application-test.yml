spring:
  datasource:
    url: jdbc:h2:mem:kmeeting-chat;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:chat-message-schema.sql

mybatis-plus:
  mapper-locations: classpath:/mapper/ChatMessageMapper.xml
  configuration:
    map-underscore-to-camel-case: false
